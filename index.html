<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tutorial</title>

<style>
html, body {
    height: 100%;
    margin: 0;
}

body {
    font-family: Arial, sans-serif;
    background: #000;
    color: #fff;

    display: grid;
    place-items: center; /* PERFECT CENTER */
}

.back-btn {
    position: fixed;
    top: 30px;
    left: 30px;
    padding: 10px 15px;
    border: 1px solid #fff;
    background: #000;
    color: #fff;
    cursor: pointer;
    border-radius: 6px;
    transition: 0.3s;
    z-index: 9999;
}

.back-btn:hover {
    background: #fff;
    color: #000;
    box-shadow: 0 0 15px #fff, 0 0 30px #fff;
}

.back-btn:active {
    transform: scale(0.95);
}

.container {
    max-width: 700px;
    padding: 20px;
    text-align: center;
    border-radius: 10px;

    box-shadow: 0 0 0px #fff;
    transition: box-shadow 0.4s ease;
}

.container:hover {
    box-shadow: 0 0 30px #fff;
}

h1 {
    text-align: center;
}

.section {
    margin: 30px 0;
}

img {
    width: 100%;
    border: 1px solid #fff;
    border-radius: 8px;
    margin-top: 10px;
}

.copy-box {
    background: #000;
    border: 1px solid #fff;
    padding: 12px;
    margin: 20px auto;
    border-radius: 8px;
    cursor: pointer;
    user-select: none;
    transition: 0.2s;
    width: 200px;
    text-align: center;
}

.copy-box:hover {
    background: #fff;
    color: #000;
}
</style>
</head>

<body>

<button class="back-btn">Back</button>

<div class="container">
    <h1>There is nothing here sorry</h1>
</div>

</body>
</html>
