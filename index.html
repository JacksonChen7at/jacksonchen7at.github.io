<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nothing</title>

<style>
html, body {
    height: 100%;
    margin: 0;
    padding: 0;
}

body {
    font-family: Arial, sans-serif;
    background: #000;
    color: #fff;

    display: grid;
    place-items: center; /* perfectly centers container */
}

.container {
    max-width: 700px;
    padding: 20px;
    text-align: center;
    border-radius: 10px;

    box-shadow: 0 0 0px #fff;
    transition: box-shadow 0.4s ease;
}

/* optional hover glow */
.container:hover {
    box-shadow: 0 0 30px #fff;
}

/* Remove default margin of h1 to fix vertical centering */
h1 {
    margin: 0;
}

.section {
    margin: 30px 0;
}

img {
    width: 100%;
    border: 1px solid #fff;
    border-radius: 8px;
    margin-top: 10px;
}

/* COPY BOX */

</style>
</head>

<body>

<div class="container">
    <h1>There is nothing here sorry</h1>
</div>

</body>
</html>
